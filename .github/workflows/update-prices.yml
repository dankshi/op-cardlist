name: Update Prices

on:
  schedule:
    # Run daily at 6 AM UTC (1 AM EST, 10 PM PST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run price scraper
        run: npm run scrape:prices
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # Authenticated TCGPlayer session — unlocks the deep latestsales feed.
          # If unset, the scraper silently falls back to anon mode (5 sales/product cap).
          # Rotate when expired: log out + back in on tcgplayer.com, grab new
          # TCGAuthTicket_Production cookie, `gh secret set TCGPLAYER_AUTH_COOKIE -b "..."`.
          TCGPLAYER_AUTH_COOKIE: ${{ secrets.TCGPLAYER_AUTH_COOKIE }}
